# =============================================================================
# nginx-config.yaml - SSL Proxy Configuration
# Cliente Integral (Streamlit)
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ssl-config
  namespace: ${NAMESPACE}
  labels:
    app: cliente-integral
    environment: ${ENVIRONMENT_NAME}
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      # Ocultar versión de nginx
      server_tokens off;

      # Upstream hacia Streamlit
      upstream streamlit {
        server localhost:3000;
      }

      # WebSocket support (requerido por Streamlit)
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      # Configuración de logs
      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;
      error_log /var/log/nginx/error.log warn;

      # ----------------------------------------------------------------------
      # Servidor HTTP (redirect a HTTPS)
      # ----------------------------------------------------------------------
      server {
        listen 80;
        server_name _;

        # Redirect a HTTPS
        return 301 https://$host$request_uri;
      }

      # ----------------------------------------------------------------------
      # Servidor HTTPS
      # ----------------------------------------------------------------------
      server {
        listen 443 ssl http2;
        server_name ${API_DOMAIN};

        # Certificados SSL
        ssl_certificate /etc/tls/tls.crt;
        ssl_certificate_key /etc/tls/tls.key;

        # Configuración SSL moderna
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ----------------------------------------------------------------------
        # Proxy a Streamlit
        # ----------------------------------------------------------------------
        location / {
          proxy_pass http://streamlit;
          proxy_http_version 1.1;

          # Headers
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # WebSocket support
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;

          # Buffering
          proxy_buffering off;
          proxy_buffer_size 4k;
        }

        # ----------------------------------------------------------------------
        # Streamlit WebSocket endpoint
        # ----------------------------------------------------------------------
        location /_stcore/stream {
          proxy_pass http://streamlit/_stcore/stream;
          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # WebSocket
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";

          # Timeouts largos para WebSocket
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;
        }

        # ----------------------------------------------------------------------
        # Health check endpoint
        # ----------------------------------------------------------------------
        location /_stcore/health {
          proxy_pass http://streamlit/_stcore/health;
          access_log off;
        }
      }
    }
