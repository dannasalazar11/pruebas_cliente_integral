# =============================================================================
# hpa.yaml - Horizontal Pod Autoscaler
# Cliente Integral (Streamlit)
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cliente-integral-hpa
  namespace: ${NAMESPACE}
  labels:
    app: cliente-integral
    environment: ${ENVIRONMENT_NAME}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cliente-integral
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 100
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 100
